version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=demo_user
      - POSTGRES_PASSWORD=demo_password
      - POSTGRES_DB=demo_db

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - db
    # We override CMD to run local dev server so we get auto-reloading
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
